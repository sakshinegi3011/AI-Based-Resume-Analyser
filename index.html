<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header>
        <h1>AI-Based Resume Analyzer</h1>
        <p>Upload your resume and get instant AI feedback</p>
    </header>

    <section class="container">
        
        <div id="errorMsg" class="error-msg"></div>

        <!-- Resume Upload -->
        <div class="card">
            <h2>Upload Resume</h2>
            <div class="drop-zone">
                <span class="drop-icon">📄</span>
                <div class="drop-text">Click or drag resume here</div>
                <div class="drop-hint">PDF, DOC, DOCX</div>
                <input type="file" id="resumeUpload" accept=".pdf,.doc,.docx">
            </div>
            <div id="fileName"></div>
        </div>

        <!-- Job Description -->
        <div class="card">
            <h2>Job Description</h2>
            <textarea id="jobDescription" rows="6"
                placeholder="Paste job description here..."></textarea>
        </div>

        <!-- Analyze Button -->
        <div class="card">
            <button id="analyzeBtn" type="button" onclick="analyzeResume()">Analyze Resume</button>
        </div>

        <!-- Result Section -->
        <div class="card result" id="resultSection" style="display:none;">
            <h2>Analysis Result</h2>
            
            <div id="loadingSection" class="loading-pulse" style="display:none;">
                <div class="spinner"></div>
                <span id="loadingText">Reading your resume...</span>
            </div>

            <div id="resultContent" style="display:none;">
                <!-- Filled dynamically by script.js -->
            </div>
        </div>
    </section>

<script src="script.js"></script>

</body>
</html>
