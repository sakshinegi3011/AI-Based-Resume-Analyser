<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>AI-Based Resume Analyzer</h1>
        <p>Upload your resume and get instant AI feedback</p>
    </header>

    <section class="container">
        
        <!-- Resume Upload -->
        <div class="card">
            <h2>Upload Resume</h2>
            <input type="file" id="resumeUpload" accept=".pdf,.doc,.docx">
        </div>

        <!-- Job Description -->
        <div class="card">
            <h2>Job Description</h2>
            <textarea id="jobDescription" rows="6" 
            placeholder="Paste job description here..."></textarea>
        </div>

        <!-- Analyze Button -ssßS->
        <div class="card">
            <button onclick="analyzeResume()">Analyze Resume</button>
        </div>

        <!-- Result Section -->
        <div class="card result" id="resultSection" style="display:none;">
            <h2>Analysis Result</h2>
            <p><strong>Resume Score:</strong> <span id="score"></span></p>
            <p><strong>Matched Skills:</strong> <span id="matchedSkills"></span></p>
            <p><strong>Missing Skills:</strong> <span id="missingSkills"></span></p>
            <p><strong>Suggestions:</strong> <span id="suggestions"></span></p>
        </div>

    </section>

<script>
function analyzeResume() {
    // Dummy Result (for HTML demo purpose)
    document.getElementById("resultSection").style.display = "block";
    document.getElementById("score").innerText = "82/100";
    document.getElementById("matchedSkills").innerText = "HTML, CSS, JavaScript";
    document.getElementById("missingSkills").innerText = "React, Node.js";
    document.getElementById("suggestions").innerText = "Add more project details and measurable achievements.";
}
</script>

</body>
</html>
